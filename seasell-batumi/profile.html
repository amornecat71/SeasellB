<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SeaSell Batumi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/src/shared.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50/30 min-h-screen flex flex-col pb-20 md:pb-0">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <button onclick="history.back()" data-i18n="back" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors"></button>
                <a href="index.html" class="text-2xl font-black text-indigo-600 tracking-tighter">SeaSell Batumi</a>
            </div>
            <div class="flex items-center gap-4">
                <div id="weatherWidget" class="hidden md:block mr-4"></div>
                <div class="relative group">
                    <button class="px-3 py-1.5 border border-slate-300 rounded-lg text-sm font-bold hover:bg-slate-50 transition-colors flex items-center gap-1">
                        <span id="currentLangDisplay">EN</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="absolute right-0 mt-2 w-24 bg-white border border-slate-200 rounded-xl shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
                        <button onclick="window.setLanguage('en')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold rounded-t-xl">EN</button>
                        <button onclick="window.setLanguage('ua')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold">UA</button>
                        <button onclick="window.setLanguage('ka')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold rounded-b-xl">KA</button>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <a href="profile.html" id="profileBtn" class="text-sm font-bold text-indigo-600 transition-colors hidden" data-i18n="nav_profile"></a>
                    <a href="auth.html" id="authBtn" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors hidden" data-i18n="nav_login"></a>
                    <button id="logoutBtn" onclick="window.handleLogout()" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors hidden" data-i18n="nav_logout"></button>
                    <a href="auth.html" id="postAdBtn" data-i18n="nav_post_ad" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-2xl font-semibold transition-all shadow-lg shadow-indigo-100 hover:scale-105"></a>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 z-50 pb-safe">
        <div class="flex justify-around items-center h-16">
            <a href="index.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_home">Home</span>
            </a>
            <a href="category.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_search">Search</span>
            </a>
            <a href="add.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <div class="bg-indigo-600 text-white p-2 rounded-full -mt-5 shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <span class="text-[10px] font-bold mt-1" data-i18n="nav_post_ad">Post</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center w-full h-full text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_profile">Profile</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 py-12 w-full">
        <div class="mb-12">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2" data-i18n="profile_title">My Profile</h1>
            <p class="text-slate-500" id="userEmailDisplay"></p>
        </div>

        <!-- Tabs -->
        <div class="flex gap-4 mb-8 border-b border-slate-200">
            <button onclick="switchTab('my_ads')" id="tab_my_ads" class="px-6 py-3 font-bold text-indigo-600 border-b-2 border-indigo-600 transition-colors" data-i18n="profile_my_ads">My Ads</button>
            <button onclick="switchTab('favorites')" id="tab_favorites" class="px-6 py-3 font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-800 transition-colors" data-i18n="profile_favorites">Favorites</button>
        </div>

        <!-- My Ads Content -->
        <div id="content_my_ads" class="block">
            <div id="myAdsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Ads will be injected here -->
            </div>
            <div id="myAdsEmpty" class="hidden text-center py-20 bg-white rounded-3xl border border-slate-200">
                <div class="text-6xl mb-4">📝</div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">No ads posted yet</h3>
                <p class="text-slate-500 mb-6">Start selling your items today!</p>
                <a href="add.html" class="inline-block bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-100">Post an Ad</a>
            </div>
        </div>

        <!-- Favorites Content -->
        <div id="content_favorites" class="hidden">
            <div id="favoritesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Favorites will be injected here -->
            </div>
            <div id="favoritesEmpty" class="hidden text-center py-20 bg-white rounded-3xl border border-slate-200">
                <div class="text-6xl mb-4">❤️</div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">No favorites yet</h3>
                <p class="text-slate-500">Save items you like to view them later.</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-300 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-16">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-12">
                <div class="col-span-1 md:col-span-2">
                    <a href="index.html" class="text-2xl font-black text-white tracking-tighter mb-4 block">SeaSell Batumi</a>
                    <p class="text-slate-400 text-sm max-w-sm leading-relaxed" data-i18n="footer_desc"></p>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-6 uppercase tracking-wider text-sm" data-i18n="footer_links"></h4>
                    <ul class="space-y-3 text-sm text-slate-400">
                        <li><a href="about.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_about"></a></li>
                        <li><a href="contact.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_contact"></a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-6 uppercase tracking-wider text-sm" data-i18n="footer_legal"></h4>
                    <ul class="space-y-3 text-sm text-slate-400">
                        <li><a href="terms.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_terms"></a></li>
                        <li><a href="privacy.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_privacy"></a></li>
                    </ul>
                </div>
            </div>
            <div class="border-t border-slate-800 mt-12 pt-8 text-center md:text-left">
                <p class="text-slate-500 text-sm">© 2026 SeaSell Batumi. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        let currentTab = 'my_ads';

        function switchTab(tab) {
            currentTab = tab;
            
            // Update buttons
            document.getElementById('tab_my_ads').className = tab === 'my_ads' 
                ? 'px-6 py-3 font-bold text-indigo-600 border-b-2 border-indigo-600 transition-colors'
                : 'px-6 py-3 font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-800 transition-colors';
            
            document.getElementById('tab_favorites').className = tab === 'favorites'
                ? 'px-6 py-3 font-bold text-indigo-600 border-b-2 border-indigo-600 transition-colors'
                : 'px-6 py-3 font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-800 transition-colors';

            // Update content visibility
            document.getElementById('content_my_ads').classList.toggle('hidden', tab !== 'my_ads');
            document.getElementById('content_favorites').classList.toggle('hidden', tab !== 'favorites');

            if (tab === 'my_ads') fetchMyAds();
            if (tab === 'favorites') fetchFavorites();
        }

        async function fetchMyAds() {
            if (!window.currentUser) return;

            const { data: ads, error } = await window.supabaseClient
                .from('ads')
                .select('*')
                .eq('user_id', window.currentUser.id)
                .order('created_at', { ascending: false });

            const grid = document.getElementById('myAdsGrid');
            const empty = document.getElementById('myAdsEmpty');

            if (error || !ads || ads.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = ads.map(ad => `
                <div class="group bg-white rounded-3xl overflow-hidden border border-slate-200 hover:shadow-2xl transition-all duration-300 flex flex-col relative">
                    <a href="product.html?id=${ad.id}" class="flex-1 flex flex-col">
                        <div class="aspect-[4/3] overflow-hidden bg-slate-100 relative">
                            <img src="${ad.image_url || 'https://picsum.photos/seed/market/400/300'}" 
                                 alt="${ad.title}" 
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                 referrerpolicy="no-referrer">
                            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-widest text-indigo-600">
                                ${ad.condition === 'new' ? window.translations[window.currentLang].filter_new : window.translations[window.currentLang].filter_used}
                            </div>
                        </div>
                        <div class="p-6 flex-1 flex flex-col">
                            <h3 class="font-bold text-slate-800 mb-2 line-clamp-2 group-hover:text-indigo-600 transition-colors">${ad.title}</h3>
                            <div class="mt-auto flex justify-between items-end">
                                <div class="text-2xl font-black text-indigo-600">${window.formatPrice(ad.price, ad.currency)}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                                    ${new Date(ad.created_at).toLocaleDateString()}
                                </div>
                            </div>
                        </div>
                    </a>
                    <div class="px-6 pb-6 pt-2 flex gap-2">
                        <button onclick="editAd(${ad.id})" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-xl font-bold text-sm transition-colors" data-i18n="btn_edit">Edit</button>
                        <button onclick="deleteAd(${ad.id})" class="flex-1 bg-red-50 hover:bg-red-100 text-red-600 py-2 rounded-xl font-bold text-sm transition-colors" data-i18n="btn_delete">Delete</button>
                    </div>
                </div>
            `).join('');
            
            // Re-apply translations for dynamically added buttons
            window.setLanguage(window.currentLang);
        }

        async function fetchFavorites() {
            if (!window.currentUser) return;

            // 1. Get favorite IDs
            const { data: favs, error: favError } = await window.supabaseClient
                .from('favorites')
                .select('ad_id')
                .eq('user_id', window.currentUser.id);

            const grid = document.getElementById('favoritesGrid');
            const empty = document.getElementById('favoritesEmpty');

            if (favError || !favs || favs.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            const adIds = favs.map(f => f.ad_id);

            // 2. Get the actual ads
            const { data: ads, error: adsError } = await window.supabaseClient
                .from('ads')
                .select('*')
                .in('id', adIds);

            if (adsError || !ads || ads.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            
            grid.innerHTML = '';
            for (const ad of ads) {
                const isFav = await window.checkFavorite(ad.id);
                const favClass = isFav ? 'text-red-500 fill-current' : 'text-slate-400';
                
                grid.innerHTML += `
                <div class="group bg-white rounded-3xl overflow-hidden border border-slate-200 hover:shadow-2xl transition-all duration-300 flex flex-col relative" id="fav-card-${ad.id}">
                    <button onclick="event.preventDefault(); removeFavoriteFromProfile(${ad.id})" class="absolute top-4 right-4 z-10 p-2 bg-white/90 backdrop-blur rounded-full shadow-sm hover:scale-110 transition-transform">
                        <svg class="w-5 h-5 text-red-500 fill-current transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    </button>
                    <a href="product.html?id=${ad.id}" class="flex-1 flex flex-col">
                        <div class="aspect-[4/3] overflow-hidden bg-slate-100 relative">
                            <img src="${ad.image_url || 'https://picsum.photos/seed/market/400/300'}" 
                                 alt="${ad.title}" 
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                 referrerpolicy="no-referrer">
                            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-widest text-indigo-600">
                                ${ad.condition === 'new' ? window.translations[window.currentLang].filter_new : window.translations[window.currentLang].filter_used}
                            </div>
                        </div>
                        <div class="p-6 flex-1 flex flex-col">
                            <h3 class="font-bold text-slate-800 mb-2 line-clamp-2 group-hover:text-indigo-600 transition-colors">${ad.title}</h3>
                            <div class="mt-auto flex justify-between items-end">
                                <div class="text-2xl font-black text-indigo-600">${window.formatPrice(ad.price, ad.currency)}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                                    ${new Date(ad.created_at).toLocaleDateString()}
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
                `;
            }
        }

        async function removeFavoriteFromProfile(adId) {
            await window.toggleFavorite(adId);
            // Remove the card from the UI immediately
            const card = document.getElementById(`fav-card-${adId}`);
            if (card) {
                card.remove();
            }
            // Check if grid is empty now
            const grid = document.getElementById('favoritesGrid');
            if (grid.children.length === 0) {
                document.getElementById('favoritesEmpty').classList.remove('hidden');
            }
        }

        function editAd(id) {
            // Redirect to add.html with the ID parameter for editing
            window.location.href = `add.html?edit=${id}`;
        }

        async function deleteAd(id) {
            if (!confirm('Are you sure you want to delete this ad? This action cannot be undone.')) {
                return;
            }

            const { error } = await window.supabaseClient
                .from('ads')
                .delete()
                .eq('id', id)
                .eq('user_id', window.currentUser.id); // Extra security check

            if (error) {
                alert('Error deleting ad: ' + error.message);
            } else {
                fetchMyAds(); // Refresh the list
            }
        }

        // Initialize
// Initialize profile page
document.addEventListener('DOMContentLoaded', async () => {
    // 1. Обов'язкова перевірка наявності клієнта
    if (!window.supabaseClient) {
        console.error("Supabase client is not initialized in shared.js");
        return;
    }

    try {
        // 2. Отримуємо сесію ОДИН РАЗ без використання слухачів (onAuthStateChange)
        const { data: { session }, error } = await window.supabaseClient.auth.getSession();

        if (error) {
            console.error("Auth error:", error.message);
            window.location.replace('auth.html');
            return;
        }

        // 3. Якщо сесії немає - відправляємо на логін
        if (!session) {
            console.log("No active session found, redirecting...");
            window.location.replace('auth.html');
            return;
        }

        // 4. Якщо ми тут - користувач залогінений. Просто відображаємо дані.
        window.currentUser = session.user;
        
        const emailDisplay = document.getElementById('userEmailDisplay');
        if (emailDisplay) {
            emailDisplay.textContent = session.user.email;
        }
        
        // Завантажуємо оголошення
        if (typeof fetchMyAds === 'function') {
            fetchMyAds();
        }

    } catch (err) {
        console.error("Critical error in profile initialization:", err);
        // Не робимо автоматичний редирект тут, щоб не створити цикл при помилках мережі
    }
});
    </script>
</body>
</html>
