<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaSell Batumi | Post Ad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/shared.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50/30 text-slate-900 pb-20 md:pb-0 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <button onclick="history.back()" data-i18n="back" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors"></button>
                <a href="index.html" class="text-2xl font-black text-indigo-600 tracking-tighter">SeaSell Batumi</a>
            </div>
            <div class="flex items-center gap-4">
                <div id="weatherWidget" class="hidden md:block mr-4"></div>
                <div class="relative group">
                    <button class="px-3 py-1.5 border border-slate-300 rounded-lg text-sm font-bold hover:bg-slate-50 transition-colors flex items-center gap-1">
                        <span id="currentLangDisplay">EN</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="absolute right-0 mt-2 w-24 bg-white border border-slate-200 rounded-xl shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
                        <button onclick="window.setLanguage('en')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold rounded-t-xl">EN</button>
                        <button onclick="window.setLanguage('ua')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold">UA</button>
                        <button onclick="window.setLanguage('ka')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold rounded-b-xl">KA</button>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <a href="profile.html" id="profileBtn" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors hidden" data-i18n="nav_profile"></a>
                    <a href="auth.html" id="authBtn" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors hidden" data-i18n="nav_login"></a>
                    <button id="logoutBtn" onclick="window.handleLogout()" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors hidden" data-i18n="nav_logout"></button>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 z-50 pb-safe">
        <div class="flex justify-around items-center h-16">
            <a href="index.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_home">Home</span>
            </a>
            <a href="category.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_search">Search</span>
            </a>
            <a href="add.html" class="flex flex-col items-center justify-center w-full h-full text-indigo-600">
                <div class="bg-indigo-600 text-white p-2 rounded-full -mt-5 shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <span class="text-[10px] font-bold mt-1" data-i18n="nav_post_ad">Post</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_profile">Profile</span>
            </a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-16">
        <div class="bg-white p-10 md:p-16 rounded-[3rem] border border-slate-200 shadow-sm">
            <h1 data-i18n="form_title" class="text-3xl font-black text-slate-900 mb-10"></h1>
            
            <form id="adForm" class="space-y-8">
                <div>
                    <label data-i18n="form_label_title" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-3"></label>
                    <input type="text" id="title" required class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label data-i18n="form_label_price" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-3"></label>
                        <div class="flex gap-2">
                            <input type="number" id="price" required class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg">
                            <select id="currency" class="w-24 p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg appearance-none font-bold text-center">
                                <option value="GEL">₾</option>
                                <option value="USD">$</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label data-i18n="form_label_cat" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-3"></label>
                        <select id="category" required class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg appearance-none">
                            <option value="electronics" data-i18n="cat_electronics"></option>
                            <option value="real-estate" data-i18n="cat_real_estate"></option>
                            <option value="auto" data-i18n="cat_auto"></option>
                            <option value="services" data-i18n="cat_services"></option>
                            <option value="home" data-i18n="cat_home"></option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label data-i18n="form_label_district" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-3"></label>
                        <select id="district" required class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg appearance-none">
                            <option value="old-batumi" data-i18n="dist_old_batumi"></option>
                            <option value="new-boulevard" data-i18n="dist_new_boulevard"></option>
                            <option value="vox-area" data-i18n="dist_vox"></option>
                            <option value="gonio" data-i18n="dist_gonio"></option>
                            <option value="makhinjauri" data-i18n="dist_makhinjauri"></option>
                        </select>
                    </div>
                    <div>
                        <label data-i18n="form_label_phone" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-3"></label>
                        <input type="tel" id="phone" required placeholder="+995..." class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg">
                    </div>
                </div>

                <div>
                    <label data-i18n="form_label_cond" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-3"></label>
                    <div class="flex gap-4">
                        <label class="flex-1">
                            <input type="radio" name="condition" value="new" checked class="hidden peer">
                            <div data-i18n="filter_new" class="text-center p-4 rounded-2xl border-2 border-slate-100 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 font-bold cursor-pointer transition-all"></div>
                        </label>
                        <label class="flex-1">
                            <input type="radio" name="condition" value="used" class="hidden peer">
                            <div data-i18n="filter_used" class="text-center p-4 rounded-2xl border-2 border-slate-100 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 font-bold cursor-pointer transition-all"></div>
                        </label>
                    </div>
                </div>

                <div>
                    <label data-i18n="form_label_desc" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-3"></label>
                    <textarea id="description" rows="5" required class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all text-lg"></textarea>
                </div>

                <div>
                    <label data-i18n="form_label_image" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-3"></label>
                    <input type="file" id="image" accept="image/*" required class="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black text-xl hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-100 flex justify-center items-center gap-3">
                    <span data-i18n="form_submit"></span>
                </button>
            </form>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-12 rounded-[3rem] text-center max-w-sm w-full shadow-2xl">
            <div class="text-6xl mb-6">🎉</div>
            <h2 data-i18n="success_msg" class="text-2xl font-black mb-8"></h2>
            <button onclick="window.location.href='index.html'" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-colors">OK</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('adForm');
        const submitBtn = document.getElementById('submitBtn');
        const editId = new URLSearchParams(window.location.search).get('edit');

        document.addEventListener('DOMContentLoaded', async () => {
            if (editId) {
                document.querySelector('[data-i18n="nav_post_ad"]').textContent = 'Edit Ad'; // Update header if needed
                document.querySelector('h1').textContent = 'Edit Ad';
                document.querySelector('[data-i18n="form_submit"]').textContent = 'Update Ad';
                await loadAdData(editId);
            }
        });

        async function loadAdData(id) {
            if (!window.supabaseClient) return;
            const { data: ad, error } = await window.supabaseClient
                .from('ads')
                .select('*')
                .eq('id', id)
                .single();

            if (error || !ad) {
                alert('Error loading ad data');
                return;
            }

            // Ensure only the owner can edit
            if (window.currentUser && ad.user_id !== window.currentUser.id) {
                alert('You do not have permission to edit this ad.');
                window.location.href = 'profile.html';
                return;
            }

            document.getElementById('title').value = ad.title;
            document.getElementById('price').value = ad.price;
            document.getElementById('currency').value = ad.currency || 'GEL';
            document.getElementById('category').value = ad.category;
            document.getElementById('district').value = ad.district || '';
            document.getElementById('phone').value = ad.seller_phone || '';
            document.getElementById('description').value = ad.description;
            
            // Set condition radio button
            const conditionRadios = document.querySelectorAll('input[name="condition"]');
            conditionRadios.forEach(radio => {
                if (radio.value === ad.condition) {
                    radio.checked = true;
                }
            });

            // Make image optional when editing
            document.getElementById('image').removeAttribute('required');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!window.supabaseClient) {
                alert("Supabase client not initialized. Please check your credentials in shared.js");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="animate-spin w-6 h-6 border-4 border-white border-t-transparent rounded-full"></div>`;

            const file = document.getElementById('image').files[0];
            const title = document.getElementById('title').value;
            const price = parseInt(document.getElementById('price').value);
            const currency = document.getElementById('currency').value;
            const category = document.getElementById('category').value;
            const district = document.getElementById('district').value;
            const seller_phone = document.getElementById('phone').value;
            const description = document.getElementById('description').value;
            const condition = document.querySelector('input[name="condition"]:checked').value;

            try {
                let publicUrl = null;

                if (file) {
                    // 1. Upload Image
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Math.random()}.${fileExt}`;
                    const filePath = `ads/${fileName}`;

                    const { error: uploadError } = await window.supabaseClient.storage
                        .from('images')
                        .upload(filePath, file);

                    if (uploadError) throw uploadError;

                    // 2. Get Public URL
                    const { data } = window.supabaseClient.storage
                        .from('images')
                        .getPublicUrl(filePath);
                    
                    publicUrl = data.publicUrl;
                } else if (editId) {
                    // If editing and no new image, keep the old one
                    const { data: existingAd } = await window.supabaseClient
                        .from('ads')
                        .select('image_url')
                        .eq('id', editId)
                        .single();
                    if (existingAd) {
                        publicUrl = existingAd.image_url;
                    }
                }

                const adData = {
                    title,
                    price,
                    currency,
                    category,
                    district,
                    seller_phone,
                    description,
                    condition,
                    image_url: publicUrl,
                    user_id: window.currentUser.id
                };

                // 3. Insert or Update DB
                if (editId) {
                    const { error: updateError } = await window.supabaseClient
                        .from('ads')
                        .update(adData)
                        .eq('id', editId)
                        .eq('user_id', window.currentUser.id); // Security check
                    if (updateError) throw updateError;
                } else {
                    const { error: insertError } = await window.supabaseClient
                        .from('ads')
                        .insert([adData]);
                    if (insertError) throw insertError;
                }

                document.getElementById('successModal').classList.remove('hidden');

            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span data-i18n="form_submit"></span>`;
                applyTranslations();
            }
        });
    </script>
</body>
</html>
