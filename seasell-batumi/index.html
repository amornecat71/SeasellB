<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaSell Batumi | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/shared.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50/30 text-slate-900 flex flex-col min-h-screen pb-20 md:pb-0">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-indigo-600 tracking-tighter">SeaSell Batumi</a>
            <div class="flex items-center gap-4">
                <div id="weatherWidget" class="hidden md:block mr-4"></div>
                <div class="relative group">
                    <button class="px-3 py-1.5 border border-slate-300 rounded-lg text-sm font-bold hover:bg-slate-50 transition-colors flex items-center gap-1">
                        <span id="currentLangDisplay">EN</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="absolute right-0 mt-2 w-24 bg-white border border-slate-200 rounded-xl shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
                        <button onclick="window.setLanguage('en')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold rounded-t-xl">EN</button>
                        <button onclick="window.setLanguage('ua')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold">UA</button>
                        <button onclick="window.setLanguage('ka')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold rounded-b-xl">KA</button>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <a href="profile.html" id="profileBtn" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors hidden" data-i18n="nav_profile"></a>
                    <a href="auth.html" id="authBtn" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors hidden" data-i18n="nav_login"></a>
                    <button id="logoutBtn" onclick="window.handleLogout()" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors hidden" data-i18n="nav_logout"></button>
                    <a href="auth.html" id="postAdBtn" data-i18n="nav_post_ad" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-2xl font-semibold transition-all shadow-lg shadow-indigo-100 hover:scale-105"></a>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 z-50 pb-safe">
        <div class="flex justify-around items-center h-16">
            <a href="index.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_home">Home</span>
            </a>
            <a href="category.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_search">Search</span>
            </a>
            <a href="add.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <div class="bg-indigo-600 text-white p-2 rounded-full -mt-5 shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <span class="text-[10px] font-bold mt-1" data-i18n="nav_post_ad">Post</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_profile">Profile</span>
            </a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="bg-white border-b border-slate-200 py-20">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 data-i18n="hero_title" class="text-4xl md:text-5xl font-black text-slate-900 mb-8 tracking-tight"></h1>
            <form id="searchForm" class="relative max-w-2xl mx-auto group">
                <input type="text" id="searchInput" data-i18n="hero_search_placeholder" 
                    class="w-full pl-6 pr-32 py-5 bg-slate-100 border-none rounded-3xl focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-lg">
                <button type="submit" data-i18n="hero_search_btn" 
                    class="absolute right-3 top-3 bottom-3 bg-indigo-600 text-white px-8 rounded-2xl font-bold hover:bg-indigo-700 transition-colors"></button>
            </form>
        </div>
    </section>

    <!-- Categories Grid -->
    <section class="max-w-7xl mx-auto px-4 py-16">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <a href="category.html?cat=electronics" class="group bg-white p-8 rounded-3xl border border-slate-200 hover:border-indigo-500 hover:shadow-xl transition-all text-center">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">💻</div>
                <div data-i18n="cat_electronics" class="font-bold text-slate-700"></div>
            </a>
            <a href="category.html?cat=real-estate" class="group bg-white p-8 rounded-3xl border border-slate-200 hover:border-indigo-500 hover:shadow-xl transition-all text-center">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🏠</div>
                <div data-i18n="cat_real_estate" class="font-bold text-slate-700"></div>
            </a>
            <a href="category.html?cat=auto" class="group bg-white p-8 rounded-3xl border border-slate-200 hover:border-indigo-500 hover:shadow-xl transition-all text-center">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🚗</div>
                <div data-i18n="cat_auto" class="font-bold text-slate-700"></div>
            </a>
            <a href="category.html?cat=services" class="group bg-white p-8 rounded-3xl border border-slate-200 hover:border-indigo-500 hover:shadow-xl transition-all text-center">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🛠️</div>
                <div data-i18n="cat_services" class="font-bold text-slate-700"></div>
            </a>
            <a href="category.html?cat=home" class="group bg-white p-8 rounded-3xl border border-slate-200 hover:border-indigo-500 hover:shadow-xl transition-all text-center">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🛋️</div>
                <div data-i18n="cat_home" class="font-bold text-slate-700"></div>
            </a>
        </div>
    </section>

    <!-- Latest Ads -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 pb-24">
        <h2 data-i18n="latest_ads" class="text-2xl font-black text-slate-900 mb-8"></h2>
        <div id="adsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Skeleton Loading -->
            <div class="animate-pulse bg-white rounded-3xl h-80 border border-slate-200"></div>
            <div class="animate-pulse bg-white rounded-3xl h-80 border border-slate-200"></div>
            <div class="animate-pulse bg-white rounded-3xl h-80 border border-slate-200"></div>
            <div class="animate-pulse bg-white rounded-3xl h-80 border border-slate-200"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-300 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-16">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-12">
                <div class="col-span-1 md:col-span-2">
                    <a href="index.html" class="text-2xl font-black text-white tracking-tighter mb-4 block">SeaSell Batumi</a>
                    <p class="text-slate-400 text-sm max-w-sm leading-relaxed" data-i18n="footer_desc"></p>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-6 uppercase tracking-wider text-sm" data-i18n="footer_links"></h4>
                    <ul class="space-y-3 text-sm text-slate-400">
                        <li><a href="about.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_about"></a></li>
                        <li><a href="contact.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_contact"></a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-6 uppercase tracking-wider text-sm" data-i18n="footer_legal"></h4>
                    <ul class="space-y-3 text-sm text-slate-400">
                        <li><a href="terms.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_terms"></a></li>
                        <li><a href="privacy.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_privacy"></a></li>
                    </ul>
                </div>
            </div>
            <div class="border-t border-slate-800 mt-12 pt-8 text-center md:text-left">
                <p class="text-slate-500 text-sm">© 2026 SeaSell Batumi. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (query) window.location.href = `category.html?search=${encodeURIComponent(query)}`;
        });

        async function fetchLatestAds() {
            if (!window.supabaseClient) return;
            const { data: ads, error } = await window.supabaseClient
                .from('ads')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(8);

            if (error) {
                console.error('Error:', error);
                return;
            }

            const grid = document.getElementById('adsGrid');
            grid.innerHTML = '';
            
            for (const ad of ads) {
                const isFav = await window.checkFavorite(ad.id);
                const favClass = isFav ? 'text-red-500 fill-current' : 'text-slate-400';
                
                grid.innerHTML += `
                <div class="group bg-white rounded-3xl overflow-hidden border border-slate-200 hover:shadow-2xl transition-all duration-300 flex flex-col relative">
                    <button onclick="event.preventDefault(); window.toggleFavorite(${ad.id}, this.querySelector('svg'))" class="absolute top-4 right-4 z-10 p-2 bg-white/90 backdrop-blur rounded-full shadow-sm hover:scale-110 transition-transform">
                        <svg class="w-5 h-5 ${favClass} transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    </button>
                    <a href="product.html?id=${ad.id}" class="flex-1 flex flex-col">
                        <div class="aspect-[4/3] overflow-hidden bg-slate-100 relative">
                            <img src="${ad.image_url || 'https://picsum.photos/seed/market/400/300'}" 
                                 alt="${ad.title}" 
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                 referrerpolicy="no-referrer">
                            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-widest text-indigo-600">
                                ${ad.condition === 'new' ? window.translations[window.currentLang].filter_new : window.translations[window.currentLang].filter_used}
                            </div>
                        </div>
                        <div class="p-6 flex-1 flex flex-col">
                            <h3 class="font-bold text-slate-800 mb-2 line-clamp-2 group-hover:text-indigo-600 transition-colors">${ad.title}</h3>
                            <div class="mt-auto flex justify-between items-end">
                                <div class="text-2xl font-black text-indigo-600">${window.formatPrice(ad.price, ad.currency)}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
                                    ${new Date(ad.created_at).toLocaleDateString()}
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
                `;
            }
        }

        fetchLatestAds();
    </script>
</body>
</html>
