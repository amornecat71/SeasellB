<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaSell Batumi | Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/shared.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Inter', sans-serif; } 
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50/30 text-slate-900 flex flex-col min-h-screen pb-20 md:pb-0">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <button onclick="history.back()" data-i18n="back" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors"></button>
                <a href="index.html" class="text-2xl font-black text-indigo-600 tracking-tighter">SeaSell Batumi</a>
            </div>
            <div class="flex items-center gap-4">
                <div id="weatherWidget" class="hidden md:block mr-4"></div>
                <div class="relative group">
                    <button class="px-3 py-1.5 border border-slate-300 rounded-lg text-sm font-bold hover:bg-slate-50 transition-colors flex items-center gap-1">
                        <span id="currentLangDisplay">EN</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="absolute right-0 mt-2 w-24 bg-white border border-slate-200 rounded-xl shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
                        <button onclick="window.setLanguage('en')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold rounded-t-xl">EN</button>
                        <button onclick="window.setLanguage('ua')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold">UA</button>
                        <button onclick="window.setLanguage('ka')" class="block w-full text-left px-4 py-2 hover:bg-slate-50 text-sm font-bold rounded-b-xl">KA</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 z-50 pb-safe">
        <div class="flex justify-around items-center h-16">
            <a href="index.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_home">Home</span>
            </a>
            <a href="category.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_search">Search</span>
            </a>
            <a href="add.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 hover:text-indigo-600">
                <div class="bg-indigo-600 text-white p-2 rounded-full -mt-5 shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <span class="text-[10px] font-bold mt-1" data-i18n="nav_post_ad">Post</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center w-full h-full text-indigo-600">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[10px] font-bold" data-i18n="nav_profile">Profile</span>
            </a>
        </div>
    </nav>

    <!-- Auth Forms -->
    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm w-full max-w-md animate-[fadeInUp_0.5s_ease-out]">
            <h1 id="authTitle" data-i18n="auth_login_title" class="text-3xl font-black text-slate-900 mb-8 text-center transition-all duration-300"></h1>
            
            <button id="googleAuthBtn" class="w-full bg-white border border-slate-200 text-slate-700 py-4 rounded-2xl font-bold text-lg hover:bg-slate-50 hover:shadow-md transition-all duration-300 flex items-center justify-center gap-3 mb-6">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span data-i18n="auth_google">Continue with Google</span>
            </button>

            <div class="flex items-center gap-4 mb-6">
                <div class="h-px bg-slate-200 flex-1"></div>
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest" data-i18n="auth_or">OR</span>
                <div class="h-px bg-slate-200 flex-1"></div>
            </div>

            <form id="authForm" class="space-y-6 transition-all duration-300">
                <div>
                    <label data-i18n="auth_email" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2"></label>
                    <input type="email" id="email" required class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all duration-300">
                </div>
                <div>
                    <label data-i18n="auth_password" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2"></label>
                    <input type="password" id="password" required class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all duration-300">
                </div>
                <div id="confirmPasswordContainer" class="hidden overflow-hidden transition-all duration-300 max-h-0 opacity-0">
                    <label data-i18n="auth_confirm_password" class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2"></label>
                    <input type="password" id="confirmPassword" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 transition-all duration-300">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-indigo-700 hover:scale-[1.02] hover:shadow-2xl transition-all duration-300 shadow-xl shadow-indigo-100">
                    <span data-i18n="auth_submit_login"></span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <button id="toggleAuthBtn" data-i18n="auth_toggle_register" class="text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors duration-300"></button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-300 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-16">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-12">
                <div class="col-span-1 md:col-span-2">
                    <a href="index.html" class="text-2xl font-black text-white tracking-tighter mb-4 block">SeaSell Batumi</a>
                    <p class="text-slate-400 text-sm max-w-sm leading-relaxed" data-i18n="footer_desc"></p>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-6 uppercase tracking-wider text-sm" data-i18n="footer_links"></h4>
                    <ul class="space-y-3 text-sm text-slate-400">
                        <li><a href="about.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_about"></a></li>
                        <li><a href="contact.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_contact"></a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold text-white mb-6 uppercase tracking-wider text-sm" data-i18n="footer_legal"></h4>
                    <ul class="space-y-3 text-sm text-slate-400">
                        <li><a href="terms.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_terms"></a></li>
                        <li><a href="privacy.html" class="hover:text-indigo-400 transition-colors" data-i18n="footer_privacy"></a></li>
                    </ul>
                </div>
            </div>
            <div class="border-t border-slate-800 mt-12 pt-8 text-center md:text-left">
                <p class="text-slate-500 text-sm">© 2026 SeaSell Batumi. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if already logged in
            if (window.supabaseClient) {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (session) {
                    window.location.href = 'profile.html';
                }
            }
        });

        let isLogin = true;
        const form = document.getElementById('authForm');
        const toggleBtn = document.getElementById('toggleAuthBtn');
        const title = document.getElementById('authTitle');
        const submitBtn = document.getElementById('submitBtn');
        const confirmPasswordContainer = document.getElementById('confirmPasswordContainer');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            title.setAttribute('data-i18n', isLogin ? 'auth_login_title' : 'auth_register_title');
            submitBtn.querySelector('span').setAttribute('data-i18n', isLogin ? 'auth_submit_login' : 'auth_submit_register');
            toggleBtn.setAttribute('data-i18n', isLogin ? 'auth_toggle_register' : 'auth_toggle_login');
            
            if (isLogin) {
                confirmPasswordContainer.classList.add('max-h-0', 'opacity-0', 'hidden');
                confirmPasswordContainer.classList.remove('max-h-24', 'opacity-100', 'mt-6');
                confirmPasswordInput.removeAttribute('required');
            } else {
                confirmPasswordContainer.classList.remove('hidden');
                // slight delay to allow display:block to apply before animating
                setTimeout(() => {
                    confirmPasswordContainer.classList.remove('max-h-0', 'opacity-0');
                    confirmPasswordContainer.classList.add('max-h-24', 'opacity-100', 'mt-6');
                }, 10);
                confirmPasswordInput.setAttribute('required', 'true');
            }
            
            window.applyTranslations();
        });

        document.getElementById('googleAuthBtn').addEventListener('click', async () => {
            if (!window.supabaseClient) return alert("Supabase not configured.");
            try {
                const { data, error } = await window.supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/index.html'
                    }
                });
                if (error) throw error;
            } catch (err) {
                alert(err.message);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!window.supabaseClient) return alert("Supabase not configured.");

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (!isLogin && password !== confirmPassword) {
                alert(window.translations[window.currentLang].auth_passwords_mismatch || "Passwords do not match");
                return;
            }
            
            submitBtn.disabled = true;
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = `<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full mx-auto"></div>`;

            try {
                let error;
                if (isLogin) {
                    const res = await window.supabaseClient.auth.signInWithPassword({ email, password });
                    error = res.error;
                } else {
                    const res = await window.supabaseClient.auth.signUp({ email, password });
                    error = res.error;
                    if (!error) alert("Registration successful! You can now log in.");
                }

                if (error) throw error;
                
                if (isLogin) {
                    window.location.href = 'index.html';
                } else {
                    isLogin = true;
                    toggleBtn.click(); // Switch back to login view
                }
            } catch (err) {
                alert(err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
